[username]
show_always = true
format = "[$user]($style):"

[hostname]
ssh_only = true
format = "[$hostname]($style):"

[directory]
style = "cyan"
truncation_length = 3
truncation_symbol = ".../"
truncate_to_repo = true
read_only = " 🔒"
format = "[$path]($style)[$read_only]($read_only_style) "
